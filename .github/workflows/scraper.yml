name: Job Scraper

# We'll run our scraper 4 times a day in 6 hour intervals.
on:
  schedule:
    - cron: '0 4 * * *'    
    - cron: '0 10 * * *'   
    - cron: '0 16 * * *'   
    - cron: '0 22 * * *'   
  workflow_dispatch:      

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: Albert 
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

     # We'll cache our dependanxies to stop our action from taking too long to complete.
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # We also cache our browsers so our actions run faster.
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install playwright python-dotenv resend
          playwright install-deps chromium
          if [ ! -d ~/.cache/ms-playwright ]; then
            playwright install chromium
          fi

      - name: Run scraper
        env:
          EMAIL: ${{ secrets.EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JOBRIGHT_EMAIL: ${{ secrets.JOBRIGHT_EMAIL }}
          JOBRIGHT_PASSWORD: ${{ secrets.JOBRIGHT_PASSWORD }}
        run: python3 bin/scraper.py
