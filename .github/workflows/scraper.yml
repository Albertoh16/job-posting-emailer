name: Job Scraper

# We'll run our scraper 4 times a day in 6 hour intervals.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'  
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'  
    - cron: '0 23 * * *'   

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # We'll cache our dependencies to stop our action from taking too long to complete.
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # We also cache our browsers so our actions run faster.
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      # We cache the Jobright session to skip login on repeat runs.
      - name: Cache Jobright session
        uses: actions/cache@v3
        with:
          path: bin/jobright_session.json
          key: jobright-session

      - name: Install dependencies
        run: |
          pip install playwright python-dotenv resend
          playwright install-deps chromium
          if [ ! -d ~/.cache/ms-playwright ]; then
            playwright install chromium
          fi

      - name: Run scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JOBRIGHT_EMAIL: ${{ secrets.JOBRIGHT_EMAIL }}
          JOBRIGHT_PASSWORD: ${{ secrets.JOBRIGHT_PASSWORD }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: python3 bin/scraper.py
